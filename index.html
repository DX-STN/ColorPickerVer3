<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Color Picker 簡易版 ver3 修正版</title>
  <style>
    body {
      font-family: sans-serif;
      padding: 16px;
      font-size: 16px;
      background-color: #f5f5f5;
    }
    h1 {
      font-size: 20px;
      margin: 0 0 12px;
    }
    h2 {
      font-size: 18px;
      margin: 16px 0 8px;
    }
    label {
      display: inline-block;
      margin: 4px 0;
    }
    input[type="file"],
    input[type="number"],
    button {
      font-size: 16px;
      padding: 6px 10px;
      box-sizing: border-box;
    }
    input[type="number"] {
      width: 80px;
    }
    #canvasWrapper {
      margin: 12px 0;
      text-align: center;
    }
    canvas {
      border: 1px solid #ccc;
      max-width: 100%;
      touch-action: none;
      background: #eee;
    }
    #info,
    #sizeInfo,
    #estimatedSizeInfo,
    #errorInfo,
    #backupInfo {
      font-size: 13px;
      margin-top: 4px;
      white-space: pre-line;
    }
    #errorInfo {
      color: #c00;
    }
    #rangeArea,
    #backupArea {
      margin-top: 16px;
      padding: 8px;
      background-color: #fff;
      border: 1px solid #ddd;
      border-radius: 4px;
    }
  </style>
</head>
<body>
  <h1>Color Picker 簡易版 ver3 修正版</h1>

  <div>
    <label>
      画像を選択:
      <input type="file" id="imageInput" accept="image/*">
    </label>
  </div>

  <div id="canvasWrapper">
    <canvas id="canvas"></canvas>
  </div>

  <div id="info">
    画像を読み込んでから、キャンバスをタップするとその位置の色を取得します。
  </div>

  <div id="rangeArea">
    <h2>選択範囲の指定</h2>
    <div>
      <label>左上X:
        <input type="number" id="rangeX" value="0" min="0">
      </label>
      <label>左上Y:
        <input type="number" id="rangeY" value="0" min="0">
      </label>
    </div>
    <div>
      <label>幅(ピクセル):
        <input type="number" id="rangeW" value="100" min="1" max="512">
      </label>
      <label>高さ(ピクセル):
        <input type="number" id="rangeH" value="100" min="1" max="512">
      </label>
    </div>
    <button id="updateRangeBtn">この範囲でサイズ計算</button>
    <div id="sizeInfo"></div>
    <div id="estimatedSizeInfo"></div>
    <div id="errorInfo"></div>
  </div>

  <div id="backupArea">
    <h2>範囲内ピクセルのバックアップ</h2>
    <p style="margin:4px 0;">
      選択範囲内の各ピクセルの位置(x, y)と色(r, g, b)をJSON形式で保存します。
      最大 512×512 ピクセルまで。
    </p>
    <button id="backupBtn">選択範囲をJSONで保存</button>
    <div id="backupInfo"></div>
  </div>

  <script>
    const MAX_SIDE = 512;

    const imageInput = document.getElementById('imageInput');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    const rangeXInput = document.getElementById('rangeX');
    const rangeYInput = document.getElementById('rangeY');
    const rangeWInput = document.getElementById('rangeW');
    const rangeHInput = document.getElementById('rangeH');
    const updateRangeBtn = document.getElementById('updateRangeBtn');

    const sizeInfo = document.getElementById('sizeInfo');
    const estimatedSizeInfo = document.getElementById('estimatedSizeInfo');
    const errorInfo = document.getElementById('errorInfo');

    const backupBtn = document.getElementById('backupBtn');
    const backupInfo = document.getElementById('backupInfo');

    let img = null;
    let imgWidth = 0;
    let imgHeight = 0;

    // 画像読み込みと描画部分：ここを最優先で安定させる
    imageInput.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = (ev) => {
        const image = new Image();
        image.onload = () => {
          img = image;
          imgWidth = img.width;
          imgHeight = img.height;

          canvas.width = imgWidth;
          canvas.height = imgHeight;

          ctx.clearRect(0, 0, canvas.width, canvas.height);
          ctx.drawImage(img, 0, 0);

          errorInfo.textContent = '';
          sizeInfo.textContent =
            '画像サイズ: ' + imgWidth + ' × ' + imgHeight + ' ピクセル';

          // 初期範囲を画像に合わせてリセット
          rangeXInput.value = 0;
          rangeYInput.value = 0;
          rangeWInput.value = Math.min(100, imgWidth, MAX_SIDE);
          rangeHInput.value = Math.min(100, imgHeight, MAX_SIDE);
          updateRangeInfo();

          console.log('画像読み込み成功', imgWidth, imgHeight);
        };
        image.onerror = () => {
          img = null;
          imgWidth = 0;
          imgHeight = 0;
          ctx.clearRect(0, 0, canvas.width, canvas.height);
          errorInfo.textContent = '画像の読み込みに失敗しました。別の画像を試してください。';
          alert('画像の読み込みに失敗しました。');
        };
        image.src = ev.target.result;
      };
      reader.onerror = () => {
        alert('ファイルの読み込みに失敗しました。');
      };
      reader.readAsDataURL(file);
    });

    function getCurrentRange() {
      let x = parseInt(rangeXInput.value, 10) || 0;
      let y = parseInt(rangeYInput.value, 10) || 0;
      let w = parseInt(rangeWInput.value, 10) || 0;
      let h = parseInt(rangeHInput.value, 10) || 0;

      if (w < 1) w = 1;
      if (h < 1) h = 1;
      if (w > MAX_SIDE) w = MAX_SIDE;
      if (h > MAX_SIDE) h = MAX_SIDE;

      return { x, y, w, h };
    }

    function clampRangeToImage(range) {
      if (!img) return range;
      let { x, y, w, h } = range;

      if (x < 0) x = 0;
      if (y < 0) y = 0;
      if (x >= imgWidth) x = imgWidth - 1;
      if (y >= imgHeight) y = imgHeight - 1;

      if (x + w > imgWidth) w = imgWidth - x;
      if (y + h > imgHeight) h = imgHeight - y;

      if (w < 0) w = 0;
      if (h < 0) h = 0;

      return { x, y, w, h };
    }

    function setRangeInputs(range) {
      rangeXInput.value = range.x;
      rangeYInput.value = range.y;
      rangeWInput.value = range.w;
      rangeHInput.value = range.h;
    }

    function estimateJsonSize(range) {
      const { w, h } = range;
      const pixels = w * h;
      if (pixels <= 0) return 0;
      const base = '{"x":0,"y":0,"r":255,"g":255,"b":255},';
      const avg = base.length;
      return pixels * avg + 2;
    }

    function toReadableSize(bytes) {
      if (bytes < 1024) return bytes + ' バイト';
      const kb = bytes / 1024;
      if (kb < 1024) return kb.toFixed(1) + ' KB';
      const mb = kb / 1024;
      return mb.toFixed(2) + ' MB';
    }

    function updateRangeInfo() {
      if (!img) {
        sizeInfo.textContent = '画像を読み込んでから範囲を指定してください。';
        estimatedSizeInfo.textContent = '';
        errorInfo.textContent = '';
        return;
      }

      errorInfo.textContent = '';
      const raw = getCurrentRange();
      const clamped = clampRangeToImage(raw);
      setRangeInputs(clamped);

      const pixels = clamped.w * clamped.h;
      sizeInfo.textContent =
        '選択範囲: 左上(' + clamped.x + ', ' + clamped.y + '), 幅 ' + clamped.w +
        ' × 高さ ' + clamped.h + ' ピクセル\n' +
        'ピクセル数: ' + pixels + ' 個';

      if (clamped.w > MAX_SIDE || clamped.h > MAX_SIDE) {
        errorInfo.textContent =
          '指定できる範囲は最大 ' + MAX_SIDE + ' × ' + MAX_SIDE + ' ピクセルまでです。';
      }

      const approxBytes = estimateJsonSize(clamped);
      estimatedSizeInfo.textContent =
        '想定JSONサイズ(おおよそ): ' + toReadableSize(approxBytes);
    }

    updateRangeBtn.addEventListener('click', updateRangeInfo);
    ['input', 'change'].forEach(evt => {
      rangeXInput.addEventListener(evt, updateRangeInfo);
      rangeYInput.addEventListener(evt, updateRangeInfo);
      rangeWInput.addEventListener(evt, updateRangeInfo);
      rangeHInput.addEventListener(evt, updateRangeInfo);
    });

    backupBtn.addEventListener('click', () => {
      if (!img) {
        alert('先に画像を読み込んでください。');
        return;
      }
      updateRangeInfo();

      const clamped = clampRangeToImage(getCurrentRange());
      if (clamped.w <= 0 || clamped.h <= 0) {
        alert('有効な選択範囲が指定されていません。');
        return;
      }
      if (clamped.w > MAX_SIDE || clamped.h > MAX_SIDE) {
        alert('指定できる範囲は最大 ' + MAX_SIDE + ' × ' + MAX_SIDE + ' ピクセルまでです。');
        return;
      }

      const pixelsCount = clamped.w * clamped.h;
      const approxBytes = estimateJsonSize(clamped);
      const approxLabel = toReadableSize(approxBytes);

      const ok = confirm(
        '選択範囲内ピクセル数: ' + pixelsCount + ' 個\n' +
        '想定JSONサイズ(おおよそ): ' + approxLabel + '\n\n' +
        'この範囲をJSONでバックアップしますか？'
      );
      if (!ok) return;

      try {
        const imageData = ctx.getImageData(clamped.x, clamped.y, clamped.w, clamped.h);
        const data = imageData.data;
        const arr = [];
        let idx = 0;
        for (let yy = 0; yy < clamped.h; yy++) {
          for (let xx = 0; xx < clamped.w; xx++) {
            const r = data[idx];
            const g = data[idx + 1];
            const b = data[idx + 2];
            arr.push({
              x: clamped.x + xx,
              y: clamped.y + yy,
              r,
              g,
              b
            });
            idx += 4;
          }
        }

        const backupObj = {
          type: 'PixelColorBackup',
          createdAt: new Date().toISOString(),
          imageSize: { width: imgWidth, height: imgHeight },
          range: clamped,
          pixels: arr
        };

        const jsonText = JSON.stringify(backupObj);
        const blob = new Blob([jsonText], { type: 'application/json' });
        const sizeBytes = blob.size;
        const sizeLabel = toReadableSize(sizeBytes);

        const now = new Date();
        const y = now.getFullYear();
        const m = String(now.getMonth() + 1).padStart(2, '0');
        const d = String(now.getDate()).padStart(2, '0');
        const hh = String(now.getHours()).padStart(2, '0');
        const mm = String(now.getMinutes()).padStart(2, '0');
        const fileName = 'PixelColorBackup_' + y + m + d + '-' + hh + mm + '.json';

        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = fileName;
        document.body.appendChild(a);
        a.click();
        a.remove();
        URL.revokeObjectURL(url);

        backupInfo.textContent =
          'バックアップを保存しました。\n' +
          'ファイル名: ' + fileName + '\n' +
          '実際のJSONサイズ: ' + sizeLabel;
      } catch (e) {
        console.error(e);
        alert(
          'バックアップ保存中にエラーが発生しました。\n' +
          'ストレージ不足やメモリ不足の可能性があります。\n\n' +
          '・端末のストレージを空けてからやり直す\n' +
          '・選択範囲の縦横サイズを小さくしてから再度お試しください。'
        );
      }
    });

    // クリックで色取得（これは前のままの基本機能）
    canvas.addEventListener('click', (e) => {
      if (!img) return;
      const rect = canvas.getBoundingClientRect();
      const scaleX = canvas.width / rect.width;
      const scaleY = canvas.height / rect.height;
      const x = Math.floor((e.clientX - rect.left) * scaleX);
      const y = Math.floor((e.clientY - rect.top) * scaleY);
      const pixel = ctx.getImageData(x, y, 1, 1).data;
      const r = pixel[0];
      const g = pixel[1];
      const b = pixel[2];
      alert('座標(' + x + ', ' + y + ') の色\nR: ' + r + ', G: ' + g + ', B: ' + b);
    });
  </script>
</body>
</html>
